<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 26px; background: var(--ra-base); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Card, Stat, Eyebrow, Button } = window.RemotelyAvailableDesignSystem_66c958;
    function Demo() {
      return (
        <div className="grid">
          <Card variant="default">
            <Eyebrow>Default</Eyebrow>
            <Stat label="Hours / week" value="42" delta="reclaimed" style={{marginTop:12}} />
          </Card>
          <Card variant="glow">
            <Eyebrow>Featured</Eyebrow>
            <Stat label="Pipeline" value="+318%" delta="in 90 days" style={{marginTop:12}} />
          </Card>
          <Card variant="outline" interactive>
            <Eyebrow tone="lavender">Outline · hover</Eyebrow>
            <Stat label="ROI" value="4.2x" delta="blended" deltaTone="lavender" style={{marginTop:12}} />
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
