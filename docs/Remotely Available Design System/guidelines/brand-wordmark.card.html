<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 30px; background: var(--ra-base); }
  .mark { display: flex; align-items: center; gap: 14px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--ra-copper); box-shadow: 0 0 14px var(--ra-copper); flex: none; }
  .word { font-family: var(--font-serif); font-size: 30px; color: var(--ra-cream); letter-spacing: -0.01em; }
  .word em { font-style: italic; color: var(--ra-lavender); }
  .lockup-mono { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ra-cream-40); margin-top: 14px; }
</style>
</head>
<body>
  <div class="mark">
    <span class="dot"></span>
    <span class="word">Remotely <em>Available</em></span>
  </div>
  <div class="lockup-mono">// results-based, ai-enabled</div>
</body>
</html>
