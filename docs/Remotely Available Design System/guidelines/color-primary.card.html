<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Copper" subtitle="The brand accent; CTAs, eyebrows, key emphasis" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--ra-base); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 14px; min-height: 104px; display: flex; flex-direction: column; justify-content: flex-end; }
  .name { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--ra-base); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: rgba(0,0,0,0.55); }
  .role { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(0,0,0,0.5); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--ra-copper-deep)"><div class="name">#c4742a</div><div class="role">Deep / press</div></div>
    <div class="sw" style="background: var(--ra-copper)"><div class="name">#e38c35</div><div class="role">Copper / primary</div></div>
    <div class="sw" style="background: var(--ra-copper-bright)"><div class="name">#f0a04f</div><div class="role">Bright / hover</div></div>
  </div>
</body>
</html>
