<!-- @dsCard group="Colors" viewport="700x150" name="Secondary — Lavender" subtitle="Italic serif accents, secondary highlights" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--ra-base); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 14px; min-height: 104px; display: flex; flex-direction: column; justify-content: flex-end; }
  .name { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: #fff; }
  .role { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--ra-lavender-deep)"><div class="name">#5a63b4</div><div class="role">Deep</div></div>
    <div class="sw" style="background: var(--ra-lavender)"><div class="name">#6e77cb</div><div class="role">Lavender / secondary</div></div>
    <div class="sw" style="background: var(--ra-lavender-bright)"><div class="name">#868fde</div><div class="role">Bright</div></div>
  </div>
</body>
</html>
