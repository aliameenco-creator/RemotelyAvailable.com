<!-- @dsCard group="Colors" viewport="700x130" name="Status colors" subtitle="Semantic feedback hues, tuned for the dark palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--ra-base); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px 14px; min-height: 84px; display: flex; flex-direction: column; justify-content: flex-end; }
  .name { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: #fff; }
  .role { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--ra-success)"><div class="name">#4f9d6b</div><div class="role">Success</div></div>
    <div class="sw" style="background: var(--ra-warning)"><div class="name">#e3b035</div><div class="role">Warning</div></div>
    <div class="sw" style="background: var(--ra-danger)"><div class="name">#d2604a</div><div class="role">Danger</div></div>
  </div>
</body>
</html>
