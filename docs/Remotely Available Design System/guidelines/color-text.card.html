<!-- @dsCard group="Colors" viewport="700x150" name="Text on dark" subtitle="Cream opacity ramp for hierarchy on near-black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--ra-base); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--ra-cream-40); width: 150px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="label">--text-primary</span><span style="font-size:18px;color:var(--text-primary)">Primary cream text — full strength</span></div>
    <div class="line"><span class="label">--text-secondary</span><span style="font-size:18px;color:var(--text-secondary)">Secondary — 70% for supporting copy</span></div>
    <div class="line"><span class="label">--text-muted</span><span style="font-size:18px;color:var(--text-muted)">Muted — 55% for captions & meta</span></div>
    <div class="line"><span class="label">--text-faint</span><span style="font-size:18px;color:var(--text-faint)">Faint — 40% for disabled / hints</span></div>
  </div>
</body>
</html>
