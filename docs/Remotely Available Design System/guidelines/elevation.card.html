<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & glow" subtitle="Shadow ramp plus copper / lavender glows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 24px; background: var(--ra-base); }
  .row { display: flex; gap: 26px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 70px; background: var(--ra-surface); border-radius: var(--radius-md); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--ra-cream-55); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="tok">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="tok">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="tok">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--glow-copper)"></div><div class="tok">glow-copper</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--glow-lavender)"></div><div class="tok">glow-lavender</div></div>
  </div>
</body>
</html>
