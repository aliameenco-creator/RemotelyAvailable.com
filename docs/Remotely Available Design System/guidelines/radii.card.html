<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="xs 4 · sm 8 · md 14 (default) · lg 20 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--ra-base); }
  .row { display: flex; gap: 18px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 84px; height: 64px; background: var(--ra-surface); border: 1px solid var(--border-copper); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--ra-cream-55); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="tok">xs · 4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="tok">sm · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tok">md · 14</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tok">lg · 20</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:64px"></div><div class="tok">pill</div></div>
  </div>
</body>
</html>
