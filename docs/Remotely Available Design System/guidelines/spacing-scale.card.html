<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — 1 through 10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--ra-base); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--ra-copper); border-radius: 3px; width: 100%; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--ra-cream-55); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--ra-cream-40); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px;width:18px"></div><div class="tok">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:8px;width:18px"></div><div class="tok">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px;width:18px"></div><div class="tok">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px;width:18px"></div><div class="tok">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:24px;width:18px"></div><div class="tok">5</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px;width:18px"></div><div class="tok">6</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:48px;width:18px"></div><div class="tok">7</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="height:64px;width:18px"></div><div class="tok">8</div><div class="px">64</div></div>
  </div>
</body>
</html>
