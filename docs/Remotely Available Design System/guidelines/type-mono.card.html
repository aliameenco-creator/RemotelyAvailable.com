<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--ra-base); }
  .big { font-family: var(--font-mono); font-size: 38px; font-weight: 700; color: var(--ra-cream); }
  .labels { display: flex; gap: 26px; margin-top: 16px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ra-copper); }
  .lbl.dim { color: var(--ra-cream-40); }
</style>
</head>
<body>
  <div class="big">Space Mono</div>
  <div class="labels">
    <span class="lbl">// services</span>
    <span class="lbl dim">01 — discovery</span>
    <span class="lbl dim">+318% pipeline</span>
  </div>
</body>
</html>
