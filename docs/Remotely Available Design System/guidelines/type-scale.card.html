<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Display → caption, with role & font" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--ra-base); }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 6px 0; border-bottom: 1px solid var(--ra-cream-08); }
  .row:last-child { border-bottom: none; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ra-cream-40); width: 92px; flex: none; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--ra-copper); margin-left: auto; flex: none; }
  .s { color: var(--ra-cream); font-family: var(--font-serif); }
  .n { color: var(--ra-cream); font-family: var(--font-sans); font-weight: 700; }
</style>
</head>
<body>
  <div class="row"><span class="tag">display</span><span class="s" style="font-size:44px;line-height:1">Outcomes</span><span class="spec">Georgia 72 / 1.05</span></div>
  <div class="row"><span class="tag">h1</span><span class="s" style="font-size:32px;line-height:1.1">Section title</span><span class="spec">Georgia 48 / 1.2</span></div>
  <div class="row"><span class="tag">h2</span><span class="s" style="font-size:24px;line-height:1.1">Subsection</span><span class="spec">Georgia 36 / 1.2</span></div>
  <div class="row"><span class="tag">h3</span><span class="n" style="font-size:18px">Card heading</span><span class="spec">Jakarta 700 · 24</span></div>
  <div class="row"><span class="tag">body</span><span style="font-size:16px;color:var(--ra-cream-70);font-family:var(--font-sans)">Body copy at sixteen pixels.</span><span class="spec">Jakarta 400 · 16 / 1.55</span></div>
  <div class="row"><span class="tag">label</span><span style="font-family:var(--font-mono);font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ra-copper)">Eyebrow label</span><span class="spec">Space Mono · 13</span></div>
</body>
</html>
