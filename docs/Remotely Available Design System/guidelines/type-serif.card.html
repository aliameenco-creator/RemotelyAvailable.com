<!-- @dsCard group="Type" viewport="700x180" name="Serif Display — Georgia" subtitle="Titles & italic lavender accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--ra-base); }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ra-copper); margin-bottom: 10px; }
  .title { font-family: var(--font-serif); font-size: 56px; line-height: 1.05; color: var(--ra-cream); letter-spacing: -0.02em; }
  .title em { font-style: italic; color: var(--ra-lavender); }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--ra-cream-40); margin-top: 14px; }
</style>
</head>
<body>
  <div class="eyebrow">01 · Serif — titles & italic accents</div>
  <div class="title">Results, not <em>retainers</em></div>
  <div class="meta">Georgia · regular &amp; italic · letter-spacing -0.02em</div>
</body>
</html>
