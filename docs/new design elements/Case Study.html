<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Case Study — Meridian Freight · Remotely Available</title>
<link rel="stylesheet" href="_ds/remotely-available-design-system-66c958b9-ed5b-4b83-b4e2-877a21285eff/tokens/fonts.css">
<link rel="stylesheet" href="_ds/remotely-available-design-system-66c958b9-ed5b-4b83-b4e2-877a21285eff/tokens/colors.css">
<link rel="stylesheet" href="_ds/remotely-available-design-system-66c958b9-ed5b-4b83-b4e2-877a21285eff/tokens/typography.css">
<link rel="stylesheet" href="_ds/remotely-available-design-system-66c958b9-ed5b-4b83-b4e2-877a21285eff/tokens/spacing.css">
<link rel="stylesheet" href="_ds/remotely-available-design-system-66c958b9-ed5b-4b83-b4e2-877a21285eff/tokens/base.css">
<style>
  html { scroll-behavior: smooth; }
  body { background: var(--ra-base); }
  button { white-space: nowrap; }
  @media (max-width: 900px){ .cs-split{ grid-template-columns: 1fr !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/remotely-available-design-system-66c958b9-ed5b-4b83-b4e2-877a21285eff/_ds_bundle.js"></script>
<script type="text/babel" src="lib/shared.jsx"></script>

<script type="text/babel">
const { Button, Badge, Card, Eyebrow, Stat } = window.RemotelyAvailableDesignSystem_66c958;

const META = [
  { k: 'Client', v: 'Meridian Freight Co.' },
  { k: 'Industry', v: 'Logistics & Freight' },
  { k: 'Services', v: 'AI Voice Agents · Automations' },
  { k: 'Timeline', v: '6 weeks' },
];

function Hero() {
  return (
    <div style={{ position: 'relative', overflow: 'hidden' }}>
      <Glow style={{ top: -260, left: '60%' }} size={620} />
      <Glow color="lavender" style={{ top: 120, left: -160 }} size={360} />
      <Section pad="var(--space-9)" style={{ position: 'relative', paddingTop: 72 }}>
        <a href="Case Study.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontFamily: 'var(--font-mono)', fontSize: 12.5, color: 'var(--ra-cream-40)', marginBottom: 28 }}>
          <span style={{ transform: 'scaleX(-1)', display: 'inline-flex' }}><Icon name="arrow" size={14} /></span> All case studies
        </a>
        <span style={{ display: 'block', marginBottom: 20 }}><Badge tone="copper" variant="soft" dot>Case Study</Badge></span>
        <h1 style={{ font: 'var(--text-display)', fontSize: 'clamp(2.3rem, 4.8vw, 3.9rem)', letterSpacing: '-0.025em', lineHeight: 1.08, maxWidth: 880, textWrap: 'balance' }}>
          How Meridian Freight recovered <AccentTitle>$1.2M in missed loads</AccentTitle> with a 24/7 AI voice agent
        </h1>
        <div className="cs-split" style={{ marginTop: 44, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40, alignItems: 'end' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
            {META.map((m) => (
              <div key={m.k}>
                <div className="ra-eyebrow" style={{ marginBottom: 6 }}>{m.k}</div>
                <div style={{ fontSize: 15, color: 'var(--ra-cream)', fontWeight: 500 }}>{m.v}</div>
              </div>
            ))}
          </div>
          <Card variant="glow" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
            <Stat value="+$1.2M" label="Loads recovered / yr" delta="prev. lost to voicemail" />
            <Stat value="100%" label="Calls answered" delta="was 61%" />
            <Stat value="8 min" label="Avg. quote turnaround" delta="was 3.5 hrs" />
            <Stat value="6 wks" label="To full deployment" deltaTone="lavender" delta="on time, on budget" />
          </Card>
        </div>
      </Section>
    </div>
  );
}

function Prose({ kicker, title, children }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr', gap: 40, padding: '52px 0', borderTop: '1px solid var(--ra-cream-08)' }} className="cs-split">
      <div>
        <Eyebrow>{kicker}</Eyebrow>
        <h2 style={{ font: 'var(--text-h2)', fontSize: 28, letterSpacing: '-0.02em', marginTop: 14 }}>{title}</h2>
      </div>
      <div style={{ maxWidth: 640, display: 'flex', flexDirection: 'column', gap: 18, color: 'var(--ra-cream-70)', fontSize: 16.5, lineHeight: 1.75 }}>
        {children}
      </div>
    </div>
  );
}

const BUILT = [
  { icon: 'mic', title: 'After-hours voice agent', desc: 'Answers every inbound call, captures load details, and quotes instantly — in English and Spanish.' },
  { icon: 'bolt', title: 'Dispatch automation', desc: 'Pushes qualified loads straight into their TMS and pings the on-call dispatcher with full context.' },
  { icon: 'chat', title: 'Carrier follow-up', desc: 'Automated SMS + email sequences confirm pickups and chase missing paperwork.' },
  { icon: 'chart', title: 'Live ops dashboard', desc: 'Real-time view of calls, quotes, and recovered revenue for the leadership team.' },
];

function Built() {
  return (
    <Section>
      <SectionHead kicker="The Build" title={<>What we <AccentTitle>shipped</AccentTitle></>} align="left" />
      <div style={{ marginTop: 36, display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 18 }}>
        {BUILT.map((b) => (
          <Card key={b.title} interactive style={{ display: 'flex', gap: 16 }}>
            <span style={{ width: 44, height: 44, borderRadius: 11, flex: 'none', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: 'var(--ra-copper-08)', border: '1px solid var(--ra-copper-25)', color: 'var(--ra-copper)' }}><Icon name={b.icon} size={19} /></span>
            <div>
              <h3 style={{ font: 'var(--text-h3)', fontSize: 18 }}>{b.title}</h3>
              <p style={{ marginTop: 6, color: 'var(--ra-cream-55)', fontSize: 14.5, lineHeight: 1.6 }}>{b.desc}</p>
            </div>
          </Card>
        ))}
      </div>
    </Section>
  );
}

function PullQuote() {
  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderTop: '1px solid var(--ra-cream-08)', borderBottom: '1px solid var(--ra-cream-08)', background: 'var(--ra-ink)' }}>
      <Section style={{ position: 'relative', textAlign: 'center', maxWidth: 820 }} maxWidth={820}>
        <span style={{ color: 'var(--ra-copper)', display: 'inline-flex', marginBottom: 20 }}><Icon name="quote" size={30} /></span>
        <p style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(1.4rem, 2.6vw, 2rem)', lineHeight: 1.4, color: 'var(--ra-cream)', textWrap: 'balance' }}>
          We were losing six-figure loads to voicemail every quarter. Now the phone is <em style={{ fontStyle: 'italic', color: 'var(--ra-lavender)' }}>never</em> unanswered, and quotes go out before a competitor even calls back.
        </p>
        <div style={{ marginTop: 28, display: 'inline-flex', alignItems: 'center', gap: 14 }}>
          <span style={{ width: 46, height: 46, borderRadius: '50%', background: 'var(--ra-lavender)', color: 'var(--ra-cream)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 14 }}>DK</span>
          <div style={{ textAlign: 'left' }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--ra-cream)' }}>Dana Koval</div>
            <div style={{ fontSize: 13, color: 'var(--ra-cream-40)' }}>COO, Meridian Freight Co.</div>
          </div>
        </div>
      </Section>
    </div>
  );
}

const RESULTS = [
  { value: '+$1.2M', label: 'Annual loads recovered' },
  { value: '39%', label: 'More calls answered' },
  { value: '26×', label: 'Faster quote turnaround' },
  { value: '11 mo', label: 'Payback period' },
];
function Results() {
  return (
    <Section>
      <SectionHead kicker="The Results" title={<>Numbers that <AccentTitle>moved</AccentTitle></>}
        lead="Tracked over the first two quarters post-launch against Meridian’s own baseline." />
      <div style={{ marginTop: 44, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
        {RESULTS.map((r) => (
          <Card key={r.label} style={{ textAlign: 'center' }}><Stat value={r.value} label={r.label} align="center" /></Card>
        ))}
      </div>
    </Section>
  );
}

const RELATED = [
  { tag: 'SaaS', title: 'ScaleUp cut lead-qual time by 73% with an automation pipeline', stat: '+40% demos' },
  { tag: 'Home Services', title: 'HomeRise fields 200+ calls a day with an AI voice team', stat: '98% resolved' },
  { tag: 'Media', title: 'Apex Digital went from 1 to 5 posts a week, all on-brand', stat: '5× output' },
];
function Related() {
  return (
    <div style={{ background: 'var(--ra-ink)', borderTop: '1px solid var(--ra-cream-08)' }}>
      <Section>
        <SectionHead kicker="More Work" title="Related case studies" align="left" />
        <div style={{ marginTop: 32, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 18 }}>
          {RELATED.map((r) => (
            <Card key={r.title} interactive style={{ display: 'flex', flexDirection: 'column', gap: 16, cursor: 'pointer' }} onClick={() => location.href='Case Study.html'}>
              <Badge tone="lavender" variant="soft">{r.tag}</Badge>
              <h3 style={{ font: 'var(--text-h3)', fontSize: 18, lineHeight: 1.3 }}>{r.title}</h3>
              <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 8, borderTop: '1px solid var(--ra-cream-08)' }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--ra-copper)' }}>{r.stat}</span>
                <Icon name="arrow" size={16} style={{ color: 'var(--ra-cream-40)' }} />
              </div>
            </Card>
          ))}
        </div>
      </Section>
    </div>
  );
}

function CtaBand() {
  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderTop: '1px solid var(--ra-cream-08)' }}>
      <Glow style={{ top: '50%', left: '50%', transform: 'translate(-50%,-50%)' }} size={560} />
      <Section style={{ position: 'relative', textAlign: 'center' }}>
        <h2 style={{ font: 'var(--text-h1)', fontSize: 'clamp(2rem, 4vw, 2.8rem)', letterSpacing: '-0.02em', maxWidth: 600, margin: '0 auto', textWrap: 'balance' }}>
          Want results like <AccentTitle>Meridian’s?</AccentTitle>
        </h2>
        <div style={{ marginTop: 28 }}><Button size="lg" leading={<Icon name="arrow" size={16} />}>Book your discovery call</Button></div>
      </Section>
    </div>
  );
}

function App() {
  return (
    <>
      <Nav active="Case Studies" />
      <main>
        <Hero />
        <Section style={{ paddingTop: 'var(--space-7)' }}>
          <Prose kicker="// The Challenge" title="The phone kept ringing after hours">
            <p>Meridian Freight ran a lean dispatch desk. After 6pm and on weekends, inbound load requests went to voicemail — and in freight, the first broker to quote usually wins the load.</p>
            <p>Leadership estimated they were losing several six-figure loads a quarter, but no one could quantify it because missed calls were never logged. Hiring a 24/7 desk was cost-prohibitive.</p>
          </Prose>
          <Prose kicker="// The Approach" title="An always-on agent, wired into their stack">
            <p>We started with a free teardown of two weeks of call logs. The pattern was clear: most after-hours calls were simple, quotable loads that a well-trained agent could handle end to end.</p>
            <p>Rather than a generic chatbot, we built a voice agent trained on Meridian’s lanes, pricing rules, and tone — then wired it directly into their TMS so a captured load became a live quote in minutes.</p>
          </Prose>
        </Section>
        <Built />
        <PullQuote />
        <Results />
        <Related />
        <CtaBand />
      </main>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#1a1a1a"/><path d="M26 70V46M42 70V32M58 70V52M74 70V38" stroke="#e38c35" stroke-width="4" stroke-linecap="round"/><path d="M22 70h56" stroke="#6e77cb" stroke-width="3" stroke-linecap="round"/></svg>
</template>
</body>
</html>
